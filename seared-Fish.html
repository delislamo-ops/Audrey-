<!DOCTYPE html>

  <title>Seared Fish</title>
  <link rel="stylesheet" href="style.css">

<body>

<header>
  <h1>Seared Fish Fillet</h1>
</header>

<div class="container recipe">

  <h2>Ingredients</h2>
  <ul>
    <li>Fish fillet</li>
    <li>Salt</li>
    <li>Pepper</li>
    <li>Olive oil</li>
    <li>Butter</li>
    <li>Lemon</li>
  </ul>

  <h2>Steps</h2>
  <p>
    Pat fish dry and season well.  
    Heat pan until very hot, add oil.  
    Sear fish skin-side down until crisp.  
    Flip, add butter and baste.  
    Finish with lemon juice.
  </p>
