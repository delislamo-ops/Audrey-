<!DOCTYPE html>

  <title>Chocolate Cake</title>

<body>

<header>
  <h1>Chocolate Cake</h1>
</header>

<div class="container recipe">

  <h2>Ingredients</h2>
  <ul>
    <li>Flour</li>
    <li>Cocoa powder</li>
    <li>Sugar</li>
    <li>Eggs</li>
    <li>Butter</li>
    <li>Baking powder</li>
  </ul>

  <h2>Steps</h2>
  <p>
    Mix dry ingredients.  
    Add eggs and melted butter.  
    Stir until smooth batter forms.  
    Bake at 180°C for 30–35 minutes.  
    Let cool before serving.
  </p>
